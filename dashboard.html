 <!-- Dashboard Page -->
        <section id="dashboard" class="page">
            <h2 class="section-title">My Appointments</h2>
            <p>View and manage your upcoming and past appointments.</p>
            
            <div class="appointments-tabs">
                <button class="tab-btn active" data-tab="upcoming">Upcoming</button>
                <button class="tab-btn" data-tab="past">Past</button>
                <button class="tab-btn" data-tab="cancelled">Cancelled</button>
            </div>
            
            <div id="upcomingTab" class="tab-content">
                <div class="appointments-list" id="upcomingAppointments">
                    <!-- Upcoming appointments will be dynamically loaded here -->
                </div>
            </div>
            
            <div id="pastTab" class="tab-content" style="display: none;">
                <div class="appointments-list" id="pastAppointments">
                    <!-- Past appointments will be dynamically loaded here -->
                </div>
            </div>
            
            <div id="cancelledTab" class="tab-content" style="display: none;">
                <div class="appointments-list" id="cancelledAppointments">
                    <!-- Cancelled appointments will be dynamically loaded here -->
                </div>
            </div>
        </section>
